<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060e1a"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#19c37d"/>
      <stop offset="100%" stop-color="#10a066"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle green orb top-right -->
  <ellipse cx="980" cy="120" rx="320" ry="280" fill="#19c37d" opacity="0.06"/>
  <!-- Subtle blue orb bottom-left -->
  <ellipse cx="200" cy="520" rx="280" ry="220" fill="#1d4ed8" opacity="0.07"/>

  <!-- Top accent bar -->
  <rect x="80" y="60" width="160" height="4" rx="2" fill="url(#accent)"/>

  <!-- Shield icon -->
  <g transform="translate(80, 100)">
    <path d="M44 0 L8 14 L8 42 C8 60 26 76 44 82 C62 76 80 60 80 42 L80 14 Z"
          fill="none" stroke="#19c37d" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M30 41 L40 51 L58 33" stroke="#19c37d" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="68" fill="#f1f5f9" letter-spacing="-1">
    Your Personalized
  </text>
  <text x="80" y="345" font-family="Arial, Helvetica, sans-serif" font-weight="700"
        font-size="68" fill="url(#accent)" letter-spacing="-1">
    Survival Guide
  </text>

  <!-- Subtext -->
  <text x="80" y="415" font-family="Arial, Helvetica, sans-serif" font-weight="400"
        font-size="28" fill="#8b97a8">
    Chat with an AI survival expert. Get a free personalized
  </text>
  <text x="80" y="453" font-family="Arial, Helvetica, sans-serif" font-weight="400"
        font-size="28" fill="#8b97a8">
    PDF emergency guide delivered to your inbox.
  </text>

  <!-- Trust pills -->
  <g transform="translate(80, 500)">
    <rect width="138" height="40" rx="20" fill="#0d1829" stroke="#19c37d" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="69" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16"
          fill="#19c37d" text-anchor="middle" font-weight="600">100% Free</text>
  </g>
  <g transform="translate(234, 500)">
    <rect width="190" height="40" rx="20" fill="#0d1829" stroke="#19c37d" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="95" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16"
          fill="#19c37d" text-anchor="middle" font-weight="600">Region-Specific</text>
  </g>
  <g transform="translate(440, 500)">
    <rect width="218" height="40" rx="20" fill="#0d1829" stroke="#19c37d" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="109" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16"
          fill="#19c37d" text-anchor="middle" font-weight="600">No Account Needed</text>
  </g>

  <!-- Domain watermark bottom-right -->
  <text x="1120" y="590" font-family="Arial, Helvetica, sans-serif" font-size="22"
        fill="#4a5568" text-anchor="end" font-weight="400">
    yoursurvivalexpert.ai
  </text>
</svg>
